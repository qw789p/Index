        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: #eee; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; background: white; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); overflow: hidden; }
        .tabs { display: flex; background: var(--dark); }
        .tab { flex: 1; padding: 15px; text-align: center; color: #aaa; cursor: pointer; font-weight: bold; font-size: 14px; }
        .tab.active { color: white; background: var(--red); }
        .tab.admin-tab.active { background: var(--blue); }
        .content { padding: 20px; min-height: 400px; }
        .section { display: none; }
        .section.active { display: block; }
        .search-input { width: 100%; padding: 15px; font-size: 18px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; margin-bottom: 15px; outline: none; }
        .db-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .db-table th, .db-table td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        .db-table th { background: var(--gray); }
        .tag { font-size: 12px; padding: 2px 6px; border-radius: 4px; display: inline-block; }
        .tag-veg { background: #eafaf1; color: var(--green); border: 1px solid var(--green); }
        .tag-meat { background: #fdf2f2; color: var(--red); border: 1px solid var(--red); }
        .card { border: 1px solid #eee; border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; background: white; transition: 0.3s; }
        .table-badge { background: var(--red); color: white; padding: 5px 15px; border-radius: 20px; font-size: 20px; font-weight: bold; }
        .is-checked { background: #f0f0f0 !important; color: #aaa !important; text-decoration: line-through; opacity: 0.7; }
        .check-btn { background: #fff; border: 1px solid #ddd; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 16px; margin-left: 10px; }
        .check-btn.active { background: var(--green); color: white; border-color: var(--green); }
        .no-name { color: #bbb; font-style: italic; }
        .admin-area { width: 100%; height: 400px; font-family: monospace; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 13px; line-height: 1.5; }
        .admin-help { background: #fffbe6; border: 1px solid #ffe58f; padding: 10px; border-radius: 5px; margin-bottom: 10px; font-size: 13px; }
        .btn-group { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        .admin-btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        .btn-save { background: var(--green); }
        .btn-export { background: var(--blue); }
    </style>
</head>

    let checkedIds = JSON.parse(localStorage.getItem('checkedGuests_v2') || '[]');

    function showTab(name) {
        document.querySelectorAll('.tab, .section').forEach(el => el.classList.remove('active'));
        document.getElementById('t-' + name).classList.add('active');
        document.getElementById('s-' + name).classList.add('active');
        if(name === 'list') renderFullTable();
        if(name === 'admin') prepareSimpleArea();
    }

    function prepareSimpleArea() {
        document.getElementById('simpleInput').value = rawData.map(m => `${m.id}, ${m.station}, ${m.name}, ${m.table}, ${m.diet}`).join('\n');
    }

    function saveDataFromSimple() {
        const lines = document.getElementById('simpleInput').value.split('\n');
        const newData = [];
        try {
            lines.forEach(line => {
                if(!line.trim()) return;
                const p = line.split(',').map(x => x.trim());
                if(p.length < 5) throw new Error("格式有誤：" + line);
                newData.push({id: parseInt(p[0]), station: p[1], name: p[2], table: p[3], diet: p[4]});
            });
            if(confirm("確定覆寫資料庫？")) {
                rawData = newData;
                localStorage.setItem('spring_party_db', JSON.stringify(rawData));
                alert("存好了！");
                showTab('search');
            }
        } catch(e) { alert(e.message); }
    }

    function exportToCSV() {
        let csv = "\ufeffID,站名,姓名,桌號,餐食\n" + rawData.map(m => `${m.id},${m.station},${m.name},${m.table},${m.diet}`).join('\n');
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv'}));
        link.download = "春酒備份.csv"; link.click();
    }

    function toggleCheck(id) {
        checkedIds = checkedIds.includes(id) ? checkedIds.filter(i => i !== id) : [...checkedIds, id];
        localStorage.setItem('checkedGuests_v2', JSON.stringify(checkedIds));
        if (document.getElementById('t-list').classList.contains('active')) renderFullTable(); else processSearch();
    }

    function clearAllCheck() { if(confirm("確定清除所有人的報到狀態？")) { checkedIds = []; localStorage.setItem('checkedGuests_v2', '[]'); renderFullTable(); } }

    function renderFullTable() {
        const body = document.getElementById('fullTableBody');
        const sorted = [...rawData].sort((a,b) => parseInt(a.table) - parseInt(b.table));
        document.getElementById('totalCount').innerText = `總名單 (${sorted.length}人)`;
        body.innerHTML = sorted.map(m => {
            const ck = checkedIds.includes(m.id);
            return `<tr class="${ck?'is-checked':''}"><td><button class="check-btn ${ck?'active':''}" onclick="toggleCheck(${m.id})">${ck?'✅':'未'}</button></td><td>${m.table}</td><td>${m.name}</td><td>${m.station}</td><td><span class="tag ${m.diet==='素'?'tag-veg':'tag-meat'}">${m.diet}</span></td></tr>`;
        }).join('');
    }

    function processSearch() {
        const val = document.getElementById('mainInput').value.trim();
        const area = document.getElementById('displayArea'); 
        area.innerHTML = ''; 
        if(!val) return;
        
        let results = [];
        const isPureNumber = /^\d+$/.test(val); // 檢查是否只輸入數字

        if (isPureNumber) {
            // 如果是純數字，執行「精確桌號搜尋」
            results = rawData.filter(g => g.table === val);
            
            if (results.length > 0) {
                let h = `<div style="background:#fff8f8; padding:15px; border-radius:10px; border:2px solid var(--red); margin-bottom:15px"><b>🎯 第 ${val} 桌名單</b><hr style="border:0.5px solid #eee">`;
                results.forEach(m => {
                    const ck = checkedIds.includes(m.id);
                    h += `<div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #f9f9f9" class="${ck ? 'is-checked' : ''}">
                        <span><b>${m.name}</b> <small>(${m.station})</small></span>
                        <div><span class="tag ${m.diet==='素'?'tag-veg':'tag-meat'}">${m.diet}</span>
                        <button class="check-btn ${ck ? 'active' : ''}" onclick="toggleCheck(${m.id})">${ck ? '✅' : '報到'}</button></div></div>`;
                });
                area.innerHTML = h + '</div>';
                return; // 找到桌號後直接結束，不跑下方的模糊搜尋
            }
        }

        // 如果不是純數字，或是找不到該桌號，則執行姓名/站名的「模糊搜尋」
        const searchLow = val.toLowerCase();
        results = rawData.filter(g => 
            (g.name && g.name.toLowerCase().includes(searchLow)) || 
            (g.station && g.station.toLowerCase().includes(searchLow))
        );

        results.forEach(m => {
            const ck = checkedIds.includes(m.id);
            area.innerHTML += `<div class="card ${ck?'is-checked':''}"><div><b>${m.name}</b> <span class="tag ${m.diet==='素'?'tag-veg':'tag-meat'}">${m.diet}</span><br><small>${m.station}</small></div><div style="display:flex;align-items:center"><div class="table-badge">${m.table}桌</div><button class="check-btn ${ck?'active':''}" onclick="toggleCheck(${m.id})">${ck?'✅':'報到'}</button></div></div>`;
        });
    }
</script>
</body>

</html>
